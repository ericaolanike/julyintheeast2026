<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const GUEST_NAMES = [
  "Sikemi","Josh","Ana","Ramat","Fejiro","Erica","Kadir","Toni","Yimika","David",
  "Zainab A","Ademide","Harlan","Wura","Nan","Fike","Celey","Tobi","Dara","Uso",
  "Stephen","Zainab K","Anjola","Glory"
];

const QUESTIONS = [
  { id: "q1", text: "What is your perfect holiday?" },
  { id: "q2", text: "If you could only eat one cuisine forever, what would it be?" },
  { id: "q3", text: "What is your lazy Saturday plan?" },
  { id: "q4", text: "Who is the last artist you played on Spotify or Apple Music?" },
  { id: "q5", text: "What is your favourite movie genre?" },
  { id: "q6", text: "If you could master anything, what would it be?" },
];

const RAW_EDGES = [
  ["Erica","Nan"],["Erica","Tobi"],["Erica","Josh"],["Erica","Ademide"],["Erica","Zainab K"],
  ["Erica","Yimika"],["Erica","Fike"],["Erica","Stephen"],["Erica","Ramat"],["Erica","Toni"],
  ["Erica","Ana"],["Erica","Celey"],
  ["Nan","Toni"],["Nan","Uso"],["Nan","David"],["Nan","Josh"],["Nan","Fejiro"],["Nan","Kadir"],
  ["Nan","Wura"],["Nan","Dara"],["Nan","Glory"],["Nan","Sikemi"],["Nan","Zainab A"],
  ["Celey","Anjola"],
  ["Anjola","Toni"],
  ["Josh","Stephen"],["Josh","Toni"],
  ["Tobi","Yimika"],
  ["Ademide","Toni"],["Ademide","Josh"],["Ademide","Fike"],
  ["Fejiro","Wura"],["Fejiro","Dara"],["Fejiro","Glory"],["Fejiro","Sikemi"],["Fejiro","Toni"],["Fejiro","Nan"],
  ["Wura","Dara"],["Wura","Glory"],["Wura","Sikemi"],["Wura","Toni"],["Wura","Nan"],
  ["Dara","Glory"],["Dara","Sikemi"],["Dara","Toni"],["Dara","Nan"],
  ["Glory","Sikemi"],["Glory","Toni"],["Glory","Nan"],
  ["Sikemi","Toni"],["Sikemi","Nan"],
  ["Toni","Nan"],
  ["Ana","Harlan"],
  ["Uso","Ramat"],
  ["Zainab K","Ramat"],
];

function buildFriendGraph() {
  const graph = {};
  GUEST_NAMES.forEach(n => graph[n] = new Set());
  RAW_EDGES.forEach(([a,b]) => {
    if (!graph[a]) graph[a] = new Set();
    if (!graph[b]) graph[b] = new Set();
    graph[a].add(b);
    graph[b].add(a);
  });
  return graph;
}
const FRIEND_GRAPH = buildFriendGraph();

const ROUND_THRESHOLD = 6;
const ROUND_TIMEOUT_MS = 15 * 60 * 1000;
const STALE_LOCK_MS = 20 * 1000;
const REJOIN_TIMEOUT_MS = 30 * 60 * 1000;
const PASSCODE = "JULY26";
const DOC_PATH = ["party", "state"];

function freshGuest(name, isWalkIn = false) {
  return {
    id: name, name, isWalkIn,
    status: "not_started",
    answers: {},
    joinedWaitingAt: null,
    matchedAt: null,
    matchHistory: [],
  };
}

function initialState() {
  const guests = {};
  GUEST_NAMES.forEach(n => guests[n] = freshGuest(n));
  return { guests, rounds: [], roundCounter: 0, matchingInProgress: false, matchingLockedAt: null, forceFire: false };
}

async function loadState() {
  try {
    const doc = await db.collection(DOC_PATH[0]).doc(DOC_PATH[1]).get();
    if (!doc.exists) {
      const fresh = initialState();
      await saveState(fresh);
      return fresh;
    }
    return JSON.parse(doc.data().json);
  } catch (e) {
    console.error("load failed", e);
    return initialState();
  }
}
async function saveState(state) {
  try {
    await db.collection(DOC_PATH[0]).doc(DOC_PATH[1]).set({ json: JSON.stringify(state) });
  } catch (e) {
    console.error("save failed", e);
  }
}

function excludedPair(a, b, guests) {
  if (FRIEND_GRAPH[a] && FRIEND_GRAPH[a].has(b)) return true;
  const ga = guests[a];
  if (ga && ga.matchHistory && ga.matchHistory.some(m => m.partnerIds.includes(b))) return true;
  return false;
}

const STOPWORDS = new Set(["the","and","that","with","have","just","really","like","would","could","about","your","this","from","been","being","into","also","some","when","what","favourite","favorite","think","plan"]);

function tokenize(text) {
  const matches = (text || "").toLowerCase().match(/[a-z']+/g);
  return matches ? matches.filter(w => w.length > 3 && !STOPWORDS.has(w)) : [];
}

function craftReasonFromAnswers(names, guests) {
  for (const q of QUESTIONS) {
    const wordSets = names.map(n => new Set(tokenize(guests[n].answers[q.id])));
    let shared = wordSets[0];
    for (let i = 1; i < wordSets.length; i++) {
      shared = new Set([...shared].filter(w => wordSets[i].has(w)));
    }
    if (shared.size > 0) {
      const word = [...shared][0];
      return `You've both got "${word}" in common on "${q.text}" — a good place to start.`;
    }
  }
  const q = QUESTIONS[0];
  return `No overlap here, and that's the fun part: you see "${q.text}" quite differently — a good one to compare notes on.`;
}

function matchPool(pool, guests) {
  const remaining = [...pool];
  const pairings = [];
  while (remaining.length > 0) {
    if (remaining.length <= 1) {
      if (pairings.length > 0) {
        const last = pairings[pairings.length - 1];
        last.guestIds.push(remaining.pop());
        last.type = "trio";
        last.reason = craftReasonFromAnswers(last.guestIds, guests);
      } else {
        remaining.pop();
      }
      continue;
    }
    if (remaining.length === 3) {
      pairings.push({
        guestIds: [...remaining],
        type: "trio",
        reason: craftReasonFromAnswers([...remaining], guests),
        relaxed: false,
      });
      remaining.length = 0;
      continue;
    }
    const a = remaining.shift();
    let idx = remaining.findIndex(b => !excludedPair(a, b, guests));
    let relaxed = false;
    if (idx === -1) { idx = 0; relaxed = true; }
    const b = remaining.splice(idx, 1)[0];
    pairings.push({
      guestIds: [a, b],
      type: "pair",
      reason: craftReasonFromAnswers([a, b], guests),
      relaxed,
    });
  }
  return pairings;
}

function App() {
  const [state, setState] = useState(null);
  const [screen, setScreen] = useState("landing");
  const [unlocked, setUnlocked] = useState(false);
  const [passcodeInput, setPasscodeInput] = useState("");
  const [passcodeError, setPasscodeError] = useState("");
  const [me, setMe] = useState(null);
  const [walkInName, setWalkInName] = useState("");
  const [answers, setAnswers] = useState({});
  const [error, setError] = useState("");
  const lockRef = useRef(false);

  const refresh = useCallback(async () => {
    const s = await loadState();
    setState(s);
    return s;
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  useEffect(() => {
    const interval = setInterval(async () => {
      const s = await refresh();
      if (!s || lockRef.current) return;

      let changed = false;
      const now = Date.now();
      Object.values(s.guests).forEach(g => {
        if (g.status === "matched" && g.matchedAt && now - g.matchedAt > REJOIN_TIMEOUT_MS) {
          g.status = "waiting";
          g.joinedWaitingAt = now;
          changed = true;
        }
      });

      const pool = Object.values(s.guests).filter(g => g.status === "waiting").map(g => g.name);
      const oldestWaiting = Object.values(s.guests)
        .filter(g => g.status === "waiting" && g.joinedWaitingAt)
        .reduce((min, g) => Math.min(min, g.joinedWaitingAt), Infinity);
      const timeoutReached = oldestWaiting !== Infinity && (now - oldestWaiting) >= ROUND_TIMEOUT_MS;
      const enoughPeople = pool.length >= ROUND_THRESHOLD;

      const lockIsStale = s.matchingInProgress && (!s.matchingLockedAt || (now - s.matchingLockedAt > STALE_LOCK_MS));
      if (lockIsStale) {
        s.matchingInProgress = false;
        s.matchingLockedAt = null;
      }

      const shouldFire = pool.length >= 2 && !s.matchingInProgress && (enoughPeople || timeoutReached || s.forceFire);
      const forceFireBlocked = s.forceFire && pool.length < 2;

      if (shouldFire) {
        lockRef.current = true;
        s.matchingInProgress = true;
        s.matchingLockedAt = now;
        s.forceFire = false;
        await saveState(s);
        try {
          const pairings = matchPool(pool, s.guests);
          const fresh = await loadState();
          const roundNumber = fresh.roundCounter + 1;
          pairings.forEach(p => {
            p.guestIds.forEach(id => {
              const g = fresh.guests[id];
              if (!g) return;
              g.status = "matched";
              g.matchedAt = Date.now();
              g.matchHistory.push({
                roundNumber,
                partnerIds: p.guestIds.filter(x => x !== id),
                type: p.type,
                reason: p.reason,
                relaxed: !!p.relaxed,
              });
            });
          });
          fresh.rounds.push({ roundNumber, pairings, timestamp: Date.now() });
          fresh.roundCounter = roundNumber;
          fresh.matchingInProgress = false;
          fresh.matchingLockedAt = null;
          await saveState(fresh);
          setState(fresh);
        } catch (e) {
          const fresh = await loadState();
          fresh.matchingInProgress = false;
          await saveState(fresh);
        }
        lockRef.current = false;
      } else if (changed || forceFireBlocked) {
        if (forceFireBlocked) { s.forceFire = false; s.lastForceFireBlocked = Date.now(); }
        await saveState(s);
        setState(s);
      }
    }, 4000);
    return () => clearInterval(interval);
  }, [refresh]);

  if (!state) {
    return <div style={styles.loading}>Loading…</div>;
  }

  if (!unlocked) {
    return (
      <div style={styles.app}>
        <div style={styles.bgGlow} />
        <div style={styles.screen}>
          <div style={styles.landingEyebrow}>July in the East</div>
          <h1 style={styles.landingH1}>Enter the passcode</h1>
          <p style={styles.sub}>Ask your host for tonight's code to get in.</p>
          <input
            style={styles.input}
            type="text"
            placeholder="Passcode"
            value={passcodeInput}
            onChange={e => { setPasscodeInput(e.target.value); setPasscodeError(""); }}
            onKeyDown={e => {
              if (e.key === "Enter") {
                if (passcodeInput.trim().toUpperCase() === PASSCODE) setUnlocked(true);
                else setPasscodeError("That's not quite right — check with your host.");
              }
            }}
          />
          {passcodeError && <div style={styles.errorText}>{passcodeError}</div>}
          <button
            style={styles.primaryBtn}
            onClick={() => {
              if (passcodeInput.trim().toUpperCase() === PASSCODE) setUnlocked(true);
              else setPasscodeError("That's not quite right — check with your host.");
            }}
          >
            Enter
          </button>
        </div>
      </div>
    );
  }

  const myGuest = me ? state.guests[me] : null;

  async function pickGuest(name, isWalkInAttempt = false) {
    setError("");
    let s = state;
    const existing = s.guests[name];
    if (isWalkInAttempt && existing && !existing.isWalkIn) {
      setError(`"${name}" is already on the guest list above — tap their name there instead of typing it here.`);
      return;
    }
    if (!existing) {
      s = { ...s, guests: { ...s.guests, [name]: freshGuest(name, true) } };
      await saveState(s);
      setState(s);
    }
    setMe(name);
    const g = s.guests[name];
    if (g.status === "not_started" || g.status === "left") {
      setAnswers({});
      setScreen("quiz");
    } else {
      setScreen("waiting");
    }
  }

  async function submitQuiz() {
    const missing = QUESTIONS.some(q => !answers[q.id] || !answers[q.id].trim());
    if (missing) { setError("Please answer all six questions."); return; }
    const s = await loadState();
    const g = s.guests[me];
    g.answers = answers;
    g.status = "waiting";
    g.joinedWaitingAt = Date.now();
    await saveState(s);
    setState(s);
    setScreen("waiting");
  }

  async function readyForAnother() {
    const s = await loadState();
    const g = s.guests[me];
    g.status = "waiting";
    g.joinedWaitingAt = Date.now();
    await saveState(s);
    setState(s);
  }

  async function markLeft(name) {
    const s = await loadState();
    s.guests[name].status = "left";
    await saveState(s);
    setState(s);
  }
  async function markActive(name) {
    const s = await loadState();
    s.guests[name].status = "not_started";
    await saveState(s);
    setState(s);
  }
  async function forceFireNow() {
    const s = await loadState();
    s.forceFire = true;
    await saveState(s);
    setState(s);
  }
  async function reshuffleEveryone() {
    const s = await loadState();
    const now = Date.now();
    Object.values(s.guests).forEach(g => {
      if (g.status === "matched" || g.status === "waiting") {
        g.status = "waiting";
        g.joinedWaitingAt = now;
      }
    });
    s.forceFire = true;
    await saveState(s);
    setState(s);
  }

  const waitingCount = Object.values(state.guests).filter(g => g.status === "waiting").length;

  return (
    <div style={styles.app}>
      <div style={styles.bgGlow} />
      {screen === "landing" && (
        <Landing
          guests={state.guests}
          walkInName={walkInName}
          setWalkInName={setWalkInName}
          onPick={pickGuest}
          onWalkIn={() => walkInName.trim() && pickGuest(walkInName.trim(), true)}
          onHost={() => setScreen("host")}
          error={error}
          me={me}
        />
      )}
      {screen === "quiz" && (
        <Quiz me={me} answers={answers} setAnswers={setAnswers} onSubmit={submitQuiz} onBack={() => setScreen("landing")} error={error} />
      )}
      {screen === "waiting" && myGuest && (
        <WaitingResult guest={myGuest} waitingCount={waitingCount} onReady={readyForAnother} onBack={() => { setMe(null); setScreen("landing"); }} />
      )}
      {screen === "host" && (
        <Host state={state} onBack={() => setScreen("landing")} onForceFire={forceFireNow} onReshuffle={reshuffleEveryone} onMarkLeft={markLeft} onMarkActive={markActive} />
      )}
    </div>
  );
}

function Landing({ guests, walkInName, setWalkInName, onPick, onWalkIn, onHost, error, me }) {
  return (
    <div style={styles.screen}>
      <div style={styles.landingEyebrow}>July in the East</div>
      <h1 style={styles.landingH1}>Who will you meet today?</h1>
      <p style={styles.sub}>Tap your name to answer six quick questions. We'll find someone in the room worth meeting.</p>
      <div style={styles.grid}>
        {GUEST_NAMES.map(name => guests[name]).filter(g => g && !g.isWalkIn).map(g => (
          <button key={g.name} onClick={() => onPick(g.name)} style={{
            ...styles.nameBtn,
            ...(g.status === "matched" ? styles.nameBtnMatched : {}),
            ...(g.status === "waiting" ? styles.nameBtnWaiting : {}),
            ...(g.status === "left" ? styles.nameBtnLeft : {}),
          }}>
            {g.name}
            {g.status === "waiting" && <span style={styles.dot} />}
            {g.status === "matched" && <span style={styles.dotMatched} />}
          </button>
        ))}
      </div>
      <div style={styles.walkInRow}>
        <input style={styles.input} placeholder="Not on the list? Type your name" value={walkInName} onChange={e => setWalkInName(e.target.value)} onKeyDown={e => e.key === "Enter" && onWalkIn()} />
        <button style={styles.secondaryBtn} onClick={onWalkIn}>Join</button>
      </div>
      {error && <div style={styles.errorText}>{error}</div>}
      {me === "Erica" && <button style={styles.hostLink} onClick={onHost}>Host view →</button>}
    </div>
  );
}

function Quiz({ me, answers, setAnswers, onSubmit, onBack, error }) {
  return (
    <div style={styles.screen}>
      <button style={styles.backLink} onClick={onBack}>← back</button>
      <div style={styles.eyebrow}>Hi {me}</div>
      <h1 style={styles.h1}>Six questions</h1>
      <p style={styles.sub}>Answer honestly — this is what we'll match you on.</p>
      <div style={styles.qList}>
        {QUESTIONS.map(q => (
          <div key={q.id} style={styles.qBlock}>
            <label style={styles.qLabel}>{q.text}</label>
            <textarea style={styles.textarea} rows={2} value={answers[q.id] || ""} onChange={e => setAnswers({ ...answers, [q.id]: e.target.value })} />
          </div>
        ))}
      </div>
      {error && <div style={styles.errorText}>{error}</div>}
      <button style={styles.primaryBtn} onClick={onSubmit}>Find my match</button>
    </div>
  );
}

function WaitingResult({ guest, waitingCount, onReady, onBack }) {
  const last = guest.matchHistory[guest.matchHistory.length - 1];
  if (guest.status === "matched" && last) {
    return (
      <div style={styles.screen}>
        <button style={styles.backLink} onClick={onBack}>← back</button>
        <div style={styles.eyebrow}>Round {last.roundNumber}</div>
        <h1 style={styles.h1}>{last.type === "trio" ? "Meet your trio" : "Meet your match"}</h1>
        <div style={styles.connectRow}>
          <span style={styles.nodeMe}>{guest.name}</span>
          {last.partnerIds.map(p => (
            <span key={p} style={styles.connectLine}>
              <span style={styles.line} />
              <span style={styles.nodeOther}>{p}</span>
            </span>
          ))}
        </div>
        <p style={styles.reason}>{last.reason}</p>
        <button style={styles.primaryBtn} onClick={onReady}>Ready for another match</button>
        <p style={styles.hint}>Or just relax — you'll be moved into the next round automatically after 30 minutes.</p>
      </div>
    );
  }
  return (
    <div style={styles.screen}>
      <button style={styles.backLink} onClick={onBack}>← back</button>
      <div style={styles.eyebrow}>{guest.name}</div>
      <h1 style={styles.h1}>Finding your match…</h1>
      <div style={styles.pulseDot} />
      <p style={styles.sub}>{waitingCount} of {ROUND_THRESHOLD} needed for the next round to fire — or it'll fire automatically after 15 minutes, whichever comes first.</p>
    </div>
  );
}

function Host({ state, onBack, onForceFire, onReshuffle, onMarkLeft, onMarkActive }) {
  const [confirmingReshuffle, setConfirmingReshuffle] = useState(false);
  const guests = Object.values(state.guests);
  const waiting = guests.filter(g => g.status === "waiting");
  const matched = guests.filter(g => g.status === "matched");
  return (
    <div style={styles.screen}>
      <button style={styles.backLink} onClick={onBack}>← back</button>
      <div style={styles.eyebrow}>Host view</div>
      <h1 style={styles.h1}>Dashboard</h1>
      <div style={styles.hostStats}>
        <div style={styles.statCard}><div style={styles.statNum}>{waiting.length}</div><div style={styles.statLabel}>waiting</div></div>
        <div style={styles.statCard}><div style={styles.statNum}>{matched.length}</div><div style={styles.statLabel}>in conversation</div></div>
        <div style={styles.statCard}><div style={styles.statNum}>{state.rounds.length}</div><div style={styles.statLabel}>rounds run</div></div>
      </div>
      <button style={styles.primaryBtn} onClick={onForceFire}>Force-fire a round now</button>
      {state.lastForceFireBlocked && Date.now() - state.lastForceFireBlocked < 10000 && (
        <div style={styles.errorText}>Need at least 2 people waiting to fire a round.</div>
      )}
      <p style={styles.hint}>Rounds also auto-fire once 6 are waiting, or after 15 minutes if fewer.</p>

      {!confirmingReshuffle ? (
        <button style={styles.reshuffleBtn} onClick={() => setConfirmingReshuffle(true)}>Reshuffle everyone now</button>
      ) : (
        <div style={styles.confirmBox}>
          <p style={styles.confirmText}>This pulls everyone — including people mid-conversation — back into the pool and re-matches the whole room right now. Are you sure?</p>
          <div style={styles.confirmRow}>
            <button style={styles.reshuffleBtn} onClick={() => { onReshuffle(); setConfirmingReshuffle(false); }}>Yes, reshuffle everyone</button>
            <button style={styles.cancelBtn} onClick={() => setConfirmingReshuffle(false)}>Cancel</button>
          </div>
        </div>
      )}
      <p style={styles.hint}>Use this to break up all current conversations and re-match the entire room immediately, overriding the 30-minute wait.</p>

      <h2 style={styles.h2}>Guests</h2>
      <div style={styles.hostList}>
        {guests.map(g => (
          <div key={g.name} style={styles.hostRow}>
            <span>{g.name}{g.isWalkIn ? " (walk-in)" : ""}</span>
            <span style={styles.hostStatus}>{g.status}</span>
            {g.status !== "left" ? (
              <button style={styles.tinyBtn} onClick={() => onMarkLeft(g.name)}>Mark left</button>
            ) : (
              <button style={styles.tinyBtn} onClick={() => onMarkActive(g.name)}>Reactivate</button>
            )}
          </div>
        ))}
      </div>

      <h2 style={styles.h2}>Round history</h2>
      {state.rounds.length === 0 && <p style={styles.sub}>No rounds yet.</p>}
      {[...state.rounds].reverse().map(r => (
        <div key={r.roundNumber} style={styles.roundCard}>
          <div style={styles.roundTitle}>Round {r.roundNumber}</div>
          {r.pairings.map((p, i) => (
            <div key={i} style={styles.pairingLine}>{p.guestIds.join(" + ")} {p.relaxed ? "(relaxed)" : ""}</div>
          ))}
        </div>
      ))}
    </div>
  );
}
